  <script>
    var PARTIAL_TEMPLATE_MAP = {
      "./partials/header.html": "tpl-header",
      "./partials/hero.html": "tpl-hero",
      "./partials/how-is-works.html": "tpl-how-is-works",
      "./partials/advertisement.html": "tpl-advertisement",
      "./partials/vegetables.html": "tpl-vegetables",
      "./partials/review.html": "tpl-review",
      "./partials/your-order.html": "tpl-your-order",
      "./partials/footer.html": "tpl-footer"
    };

    function initMenu() {
      var header = document.getElementById("gh-header");
      var openBtn = document.getElementById("gh-menu-open");
      var closeTablet = document.getElementById("gh-menu-close-tablet");
      var closeMobile = document.getElementById("gh-menu-close-mobile");
      var backdrop = document.getElementById("gh-backdrop");
      var tabletMenu = document.getElementById("gh-menu-tablet");
      var mobileMenu = document.getElementById("gh-menu-mobile");
      var navLinks = document.querySelectorAll('.gh-nav__item[href^="#"], .gh-cta[href^="#"]');

      if (!header || !openBtn || !closeTablet || !closeMobile || !backdrop || !tabletMenu || !mobileMenu) return;

      function isMobile() {
        return window.matchMedia("(max-width: 767px)").matches;
      }

      function closeMenu() {
        header.classList.remove("gh-header--tablet-open", "gh-header--mobile-open");
        tabletMenu.setAttribute("aria-hidden", "true");
        mobileMenu.setAttribute("aria-hidden", "true");
        backdrop.hidden = true;
        openBtn.setAttribute("aria-expanded", "false");
        document.body.classList.remove("gh-no-scroll");
      }

      function openMenu() {
        var mobile = isMobile();
        header.classList.toggle("gh-header--tablet-open", !mobile);
        header.classList.toggle("gh-header--mobile-open", mobile);
        tabletMenu.setAttribute("aria-hidden", String(mobile));
        mobileMenu.setAttribute("aria-hidden", String(!mobile));
        backdrop.hidden = mobile;
        openBtn.setAttribute("aria-expanded", "true");
        document.body.classList.add("gh-no-scroll");
      }

      openBtn.addEventListener("click", openMenu);
      closeTablet.addEventListener("click", closeMenu);
      closeMobile.addEventListener("click", closeMenu);
      backdrop.addEventListener("click", closeMenu);
      window.addEventListener("resize", closeMenu);

      navLinks.forEach(function (link) {
        link.addEventListener("click", function (event) {
          var targetId = this.getAttribute("href");
          if (!targetId || targetId.charAt(0) !== "#") return;

          var target = document.querySelector(targetId);
          if (!target) return;

          event.preventDefault();
          closeMenu();
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          history.replaceState(null, "", targetId);
        });
      });
    }

    function injectFromTemplate(node, src) {
      var templateId = PARTIAL_TEMPLATE_MAP[src];
      if (!templateId) return;
      var template = document.getElementById(templateId);
      if (!template) return;
      node.insertAdjacentHTML("afterend", template.innerHTML);
      node.remove();
    }

    async function loadPartials() {
      var nodes = document.querySelectorAll("load[src]");
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        var src = node.getAttribute("src");
        if (!src) continue;

        try {
          var response = await fetch(src);
          if (!response.ok) throw new Error(src + " not loaded");
          var html = await response.text();
          node.insertAdjacentHTML("afterend", html);
          node.remove();
        } catch (error) {
          injectFromTemplate(node, src);
        }
      }
    }

    (async function bootstrap() {
      await loadPartials();
      initMenu();
    })();
  </script>
